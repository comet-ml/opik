[pytest]
testpaths = suite
addopts = -vv --durations=0 -p no:cacheprovider
log_cli = true
log_cli_level = INFO
python_files = test_*.py
# Global hang-guard: any individual scenario that runs longer than this
# is killed and reported as a failure, so a deadlock (e.g. SDK lock
# regression) never silently consumes the entire workflow budget.
# The longest legitimate scenario is `test_spread_over_time` at ~10 min
# at scale 1.0; 1200 s gives ~2x headroom. Scenarios with a tighter
# expected ceiling can override via @pytest.mark.timeout(...).
timeout = 1200
timeout_method = thread
