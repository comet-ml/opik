[tool.mypy]
follow_imports = "skip"
ignore_missing_imports = true
disallow_untyped_defs = true
disallow_untyped_calls = true
check_untyped_defs = true
python_version = "3.10"

[tool.pytest.ini_options]
markers = [
    "requires_litellm: tests that require litellm to be installed (temporarily quarantined)",
]

[tool.uv]
managed = false
