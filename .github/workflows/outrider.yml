name: Outrider

# Daily cron that uses remyxai/outrider to pick a paper from
# engine.remyx.ai for this research interest and open a draft PR with a
# Claude-Code-scaffolded integration.
#
# Secrets needed (set in Settings → Secrets and variables → Actions):
#   REMYX_API_KEY        — engine.remyx.ai token
#   ANTHROPIC_API_KEY — model-provider token (e.g. Anthropic, for the agent)
#
# The workflow's built-in GITHUB_TOKEN handles PR / Issue creation on
# this repo — no PAT required since the action runs in the target.

on:
  # schedule:  # cron disabled — manual dispatch only
    # # Daily at 14:00 UTC
    # - cron: '0 14 * * *'
  workflow_dispatch:
    inputs:
      backend:
        description: 'Which model backend to route Claude Code at. anthropic = default api.anthropic.com (Opus); glm = z.ai GLM Coding Plan.'
        type: choice
        required: false
        default: 'anthropic'
        options:
          - anthropic
          - glm
      pin-method:
        description: 'Method/technique query or arxiv_id to implement directly. Bypasses selection.'
        required: false
        default: ''
      pin-arxiv:
        description: 'Pinned arxiv_id (must already be in the candidate pool).'
        required: false
        default: ''

jobs:
  recommend:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
      issues: write
    env:
      REMYX_API_KEY: ${{ secrets.REMYX_API_KEY }}
      # ANTHROPIC_API_KEY / ANTHROPIC_AUTH_TOKEN are set in the
      # 'Configure backend auth' step below (one or the other, never both).
    steps:
      # Configure backend auth — Claude Code uses ANTHROPIC_AUTH_TOKEN
      # for non-default backends (Bearer header) and ANTHROPIC_API_KEY
      # for the default (x-api-key header). They're mutually exclusive;
      # job-level env can't produce empty strings via ternary, so the
      # step writes whichever is right to $GITHUB_ENV.
      - name: Configure backend auth
        shell: bash
        env:
          ANTHROPIC_API_KEY_SECRET: ${{ secrets.ANTHROPIC_API_KEY }}
          ZAI_API_KEY_SECRET: ${{ secrets.ZAI_API_KEY }}
        run: |
          if [ "${{ inputs.backend }}" = "glm" ]; then
            echo "ANTHROPIC_AUTH_TOKEN=$ZAI_API_KEY_SECRET" >> "$GITHUB_ENV"
            echo "ANTHROPIC_MODEL=glm-5.2" >> "$GITHUB_ENV"
          else
            echo "ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY_SECRET" >> "$GITHUB_ENV"
          fi
      # Diagnostic: confirm the backend-conditional secret resolved correctly.
      # Logs length + first 4 hex chars of the env var so we can tell at a
      # glance whether Anthropic key, z.ai key, or empty was injected.
      - name: Diagnostic — ANTHROPIC_API_KEY shape
        shell: bash
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "DIAG: ANTHROPIC_API_KEY is EMPTY"
          else
            len=${#ANTHROPIC_API_KEY}
            sha=$(echo -n "$ANTHROPIC_API_KEY" | sha256sum | cut -c1-8)
            echo "DIAG: ANTHROPIC_API_KEY length=$len  sha8=$sha"
          fi
          echo "DIAG: backend input=${{ inputs.backend }}"
      # Mint a remyx[bot] token from Remyx so the PR / Issue is authored by
      # the Remyx GitHub App (not github-actions[bot]). The App private key
      # stays on Remyx's side; this uses the REMYX_API_KEY already in secrets.
      # If it can't be minted (e.g. App not installed), the token is empty and
      # the action falls back to the workflow's built-in GITHUB_TOKEN.
      - name: Mint Remyx bot token
        id: remyx-bot
        shell: bash
        run: |
          token="$(curl -sf -X POST             -H "Authorization: Bearer ${{ secrets.REMYX_API_KEY }}"             -H "Content-Type: application/json"             -d "{\"repo\": \"${{ github.repository }}\"}"             "https://engine.remyx.ai/api/v1.0/github/installation-token"             | python3 -c "import sys, json; print(json.load(sys.stdin).get('token', ''))")" || token=""
          echo "::add-mask::$token"
          echo "token=$token" >> "$GITHUB_OUTPUT"
      - uses: remyxai/outrider@v1
        with:
          interest-id: 22261e0a-6f02-4e9d-b79e-8c9bcaf981f9
          pin-method: ${{ inputs.pin-method }}
          pin-arxiv: ${{ inputs.pin-arxiv }}
          model-base-url: ${{ inputs.backend == 'glm' && 'https://api.z.ai/api/anthropic' || '' }}
          # remyx[bot] token (empty → action falls back to GITHUB_TOKEN).
          github-token: ${{ steps.remyx-bot.outputs.token }}
          # Disable the per-repo rate-limit window so manual and scheduled
          # runs always evaluate the latest recommendation. Without this the
          # default 7-day floor short-circuits runs at skipped_rate_limit
          # (e.g. a manual re-run after the first auto-PR). Per-paper dedup
          # (open PR / Issue for the same arxiv_id) still prevents duplicates.
          rate-limit-days: '0'
