# Workflow to run GenAI tests
#
# Please read inputs to provide correct values.
#
name: SDK Lib GenAI (Google) Tests
run-name: "SDK Lib GenAI Tests ${{ github.ref_name }} by @${{ github.actor }}"
permissions:
  contents: read
env:
  GCP_CREDENTIALS_JSON: ${{ secrets.GCP_CREDENTIALS_JSON }}
  GOOGLE_CLOUD_LOCATION: us-east1
  GOOGLE_CLOUD_PROJECT: opik-sdk-tests
  OPIK_ENABLE_LITELLM_MODELS_MONITORING: False
  OPIK_SENTRY_ENABLE: False
  OPIK_TEST_EXPENSIVE: ${{ inputs.run_expensive_tests }}
on:
  workflow_call:
    inputs:
      run_expensive_tests:
        description: "Run expensive tests (e.g., video generation)"
        required: false
        type: boolean
        default: false

jobs:
  tests:
    name: GenAI Python ${{matrix.python_version}}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: sdks/python

    strategy:
      fail-fast: true
      # Cap concurrent matrix jobs so a future matrix expansion can't quietly
      # re-multiply concurrent Vertex AI calls and bring back the 429s.
      max-parallel: 2
      matrix:
        # Run only the oldest and newest supported Python versions. The full
        # PYTHON_VERSIONS matrix multiplies live Vertex AI calls by 5×, which
        # routinely tips the project's Gemini quota into 429 RESOURCE_EXHAUSTED
        # — and intermediate Python versions almost never surface GenAI-specific
        # regressions that the bookends miss. The ADK suite shares the same
        # opik-sdk-tests GCP project, so any uncapped suite re-multiplies their
        # contention too.
        python_version: ["3.10", "3.14"]

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Setup Python ${{matrix.python_version}}
        uses: actions/setup-python@v5
        with:
          python-version: ${{matrix.python_version}}

      - name: Install opik
        run: pip install .

      - name: Install test tools
        run: |
          cd ./tests
          pip install --no-cache-dir --disable-pip-version-check -r test_requirements.txt

      - name: Install lib
        run: |
          cd ./tests
          pip install --no-cache-dir --disable-pip-version-check -r library_integration/genai/requirements.txt

      - name: Run tests
        run: |
          cd ./tests/library_integration/genai/
          python -m pytest  -vv .