name: TypeScript SDK Unit Tests
run-name: "TypeScript SDK Unit Tests ${{ github.ref_name }} by @${{ github.actor }}"
on:
  pull_request:
    paths:
      - "sdks/typescript/**"
  push:
    branches:
      - "main"
    paths:
      - "sdks/typescript/**"
  workflow_dispatch:


concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
jobs:
  test:
    name: Test on Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: sdks/typescript
    strategy:
      fail-fast: false
      matrix:
        node-version: ${{ fromJSON(vars.NODE_VERSIONS) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4.2.0
        with:
          node-version: ${{ matrix.node-version || '20' }}

      - name: Install dependencies (npm)
        run: npm ci

      - name: Run tests (npm)
        run: npm run test

      - name: Install 'configure' tool dependencies
        working-directory: sdks/typescript/src/opik/configure
        run: npm install

      - name: Run 'configure' tool tests
        working-directory: sdks/typescript/src/opik/configure
        run: npm run test
