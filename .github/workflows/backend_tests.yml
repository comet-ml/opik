name: "Backend Tests"
run-name: "Backend Tests on ${{ github.ref_name }} by @${{ github.actor }}"

on:
  pull_request:
    paths:
      - "apps/opik-backend/**"
      - ".github/workflows/backend_tests.yml"
  push:
    branches:
      - 'main'
    paths:
      - "apps/opik-backend/**"
      - ".github/workflows/backend_tests.yml"

  workflow_dispatch:

jobs:
    # Automatically classify tests as unit/integration and split integration
    # tests into balanced groups. No manual maintenance when adding new tests.
    discover-tests:
        runs-on: ubuntu-latest
        timeout-minutes: 2
        outputs:
          matrix: ${{ steps.split.outputs.matrix }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4.1.1
              with:
                fetch-depth: 1
                sparse-checkout: apps/opik-backend/src/test/java

            - name: Classify and split tests
              id: split
              working-directory: apps/opik-backend
              run: |
                NUM_GROUPS=16
                TEST_DIR="src/test/java"
                PATTERN="DropwizardAppExtensionProvider\|MySQLContainer\|ClickHouseContainer\|RedisContainer\|MinIOContainer"

                # Classify: integration tests reference container/Dropwizard patterns
                integration_files=()
                unit_files=()
                while IFS= read -r file; do
                  if grep -ql "$PATTERN" "$file" 2>/dev/null; then
                    integration_files+=("$file")
                  else
                    unit_files+=("$file")
                  fi
                done < <(find "$TEST_DIR" -name "*Test.java" -o -name "*E2eTest.java" | sort)

                # Convert file path to Maven class pattern: com.foo.BarTest
                to_class() { echo "$1" | sed "s|^$TEST_DIR/||;s|/|.|g;s|\.java$||"; }

                # Build unit test list
                unit_list=""
                for f in "${unit_files[@]}"; do
                  c=$(to_class "$f")
                  unit_list="${unit_list:+$unit_list,}$c"
                done

                # Balanced split: sort integration files by line count desc,
                # then greedy-assign each to the smallest group
                declare -a group_size group_list
                for ((i=1; i<=NUM_GROUPS; i++)); do
                  group_size[$i]=0
                  group_list[$i]=""
                done

                while IFS=' ' read -r lines file; do
                  min_g=1
                  for ((i=2; i<=NUM_GROUPS; i++)); do
                    if (( group_size[i] < group_size[min_g] )); then
                      min_g=$i
                    fi
                  done
                  group_size[$min_g]=$(( group_size[min_g] + lines ))
                  c=$(to_class "$file")
                  group_list[$min_g]="${group_list[$min_g]:+${group_list[$min_g]},}$c"
                done < <(
                  for f in "${integration_files[@]}"; do
                    echo "$(wc -l < "$f") $f"
                  done | sort -rn
                )

                # Build JSON matrix: unit tests + N integration groups
                matrix="{\"include\":["
                matrix+="{\"name\":\"Unit Tests\",\"tests\":\"$unit_list\",\"timeout\":15}"
                for ((i=1; i<=NUM_GROUPS; i++)); do
                  matrix+=",{\"name\":\"Integration Group $i\",\"tests\":\"${group_list[$i]}\",\"timeout\":20}"
                done
                matrix+="]}"
                echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

                # Summary
                echo "### Test Split Summary" >> "$GITHUB_STEP_SUMMARY"
                echo "- **Unit tests**: ${#unit_files[@]} classes" >> "$GITHUB_STEP_SUMMARY"
                echo "- **Integration tests**: ${#integration_files[@]} classes in $NUM_GROUPS groups" >> "$GITHUB_STEP_SUMMARY"
                for ((i=1; i<=NUM_GROUPS; i++)); do
                  count=$(echo "${group_list[$i]}" | tr ',' '\n' | grep -c '.' || true)
                  echo "  - Group $i: $count classes (~${group_size[$i]} lines)" >> "$GITHUB_STEP_SUMMARY"
                done

    run-backend-tests:
        needs: discover-tests
        name: ${{ matrix.name }}
        runs-on: ubuntu-latest
        timeout-minutes: ${{ matrix.timeout }}
        defaults:
          run:
            working-directory: apps/opik-backend/
        strategy:
          fail-fast: false
          matrix: ${{ fromJSON(needs.discover-tests.outputs.matrix) }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4.1.1
              with:
                fetch-depth: 1

            - name: Set up JDK 21
              uses: actions/setup-java@v4
              with:
                java-version: '21'
                distribution: 'corretto'
                cache: maven

            - name: Run ${{ matrix.name }}
              env:
                TESTCONTAINERS_REUSE_ENABLE: true
              run: >-
                mvn clean test
                -Dtest="${{ matrix.tests }}"
                -Dmaven.test.failure.ignore=true
                -Dsurefire.rerunFailingTestsCount=3

            - name: Publish Test Report
              uses: EnricoMi/publish-unit-test-result-action/linux@v2
              if: always()
              with:
                action_fail: true
                check_name: "Backend Tests - ${{ matrix.name }}"
                files: '**/target/surefire-reports/TEST-*.xml'
