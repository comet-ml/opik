name: Application E2E Tests (TypeScript)
env:
  OPIK_SENTRY_ENABLE: False
  ALLURE_TOKEN: ${{ secrets.ALLURE_TOKEN }}
  ALLURE_JOB_RUN_ID: ${{ github.event.inputs.ALLURE_JOB_RUN_ID }}
  ALLURE_ENDPOINT: https://comet.testops.cloud/
  ALLURE_PROJECT_ID: 1
  ALLURE_RESULTS: allure-results
  SHARD_TOTAL: 4

on:
    workflow_dispatch:
        inputs:
            suite:
                type: choice
                description: 'Choose which test suite to run'
                required: true
                default: 'fullregression'
                options:
                - sanity
                - happypaths
                - fullregression
                - projects
                - tracing
                - threads
                - attachments
                - datasets
                - experiments
                - prompts
                - playground
                - feedbackscores
                - onlinescores

            ALLURE_JOB_RUN_ID:
                description: ALLURE_JOB_RUN_ID service parameter. Leave blank.
            ALLURE_USERNAME:
                description: ALLURE_USERNAME service parameter. Leave blank.

    pull_request:
      paths:
        - 'sdks/code_generation/fern/openapi/openapi.yaml'
        - 'tests_end_to_end/**'
        - '.github/workflows/end2end_suites_typescript.yml'
        - '.github/workflows/build_e2e_docker.yaml'


concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
run-name: Application E2E Tests (TypeScript) - ${{ github.event.inputs.suite || 'fullregression' }}

permissions:
  contents: read
  packages: write

jobs:
    build-opik:
        uses: ./.github/workflows/build_e2e_docker.yaml
        with:
          include_frontend: true

    setup-allure:
        name: "Create Allure launch"
        runs-on: ubuntu-latest
        timeout-minutes: 5
        outputs:
          launch_id: ${{ steps.create.outputs.launch_id }}
        steps:
            - name: Install allurectl
              uses: allure-framework/setup-allurectl@v1

            - name: Create launch
              id: create
              run: |
                SUITE="${{ github.event.inputs.suite || 'fullregression' }}"
                LAUNCH_NAME="TS E2E ${SUITE} - PR #${{ github.event.pull_request.number || github.run_id }}"
                LAUNCH_ID=$(allurectl launch create \
                  --launch-name "${LAUNCH_NAME}" \
                  --no-header \
                  --format ID | tail -n1)
                echo "Created Allure launch ${LAUNCH_ID} (${LAUNCH_NAME})"
                echo "launch_id=${LAUNCH_ID}" >> "$GITHUB_OUTPUT"

    run_suite:
        name: "Run TS suite shard ${{ matrix.shard }}/4: ${{ github.event.inputs.suite || 'fullregression' }}"
        needs: [build-opik, setup-allure]
        runs-on: ubuntu-latest
        timeout-minutes: 30
        permissions:
          contents: read
          packages: read
        strategy:
          fail-fast: false
          matrix:
            shard: [1, 2, 3, 4]

        steps:
            - name: Checkout repo
              uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                node-version: '20'
                cache: 'npm'
                cache-dependency-path: tests_end_to_end/typescript-tests/package-lock.json

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                python-version: 3.12

            - name: Install Opik Python SDK
              run: pip install ${{ github.workspace }}/sdks/python

            - name: Install Test Helper Service Dependencies
              run: |
                pip install -r ${{ github.workspace }}/tests_end_to_end/test-helper-service/requirements.txt

            - name: Install TypeScript Test Dependencies
              working-directory: ${{ github.workspace }}/tests_end_to_end/typescript-tests
              run: |
                npm ci
                npx playwright install chromium

            - name: Install allurectl
              uses: allure-framework/setup-allurectl@v1

            - name: Login to GHCR
              uses: docker/login-action@v3
              with:
                registry: ghcr.io
                username: ${{ github.actor }}
                password: ${{ secrets.GITHUB_TOKEN }}

            - name: Pull Opik images from GHCR
              env:
                TAG: ${{ needs.build-opik.outputs.image_tag }}
              run: |
                for IMAGE in opik-backend opik-python-backend opik-frontend; do
                  docker pull "ghcr.io/comet-ml/opik/${IMAGE}:${TAG}"
                  docker tag "ghcr.io/comet-ml/opik/${IMAGE}:${TAG}" "ghcr.io/comet-ml/opik/${IMAGE}:latest"
                done

            - name: Start Opik (from GHCR)
              env:
                OPIK_USAGE_REPORT_ENABLED: false
                COMPOSE_BAKE: false
                OPIK_BACKEND_PULL_POLICY: never
                PYTHON_BACKEND_PULL_POLICY: never
                OPIK_FRONTEND_PULL_POLICY: never
              run: |
                cd ${{ github.workspace }}
                TOGGLE_WELCOME_WIZARD_ENABLED="false" TOGGLE_FORCE_WORKSPACE_VERSION="version_1" ./opik.sh

            - name: Check Docker pods are up (Local)
              run: |
                chmod +x ./tests_end_to_end/installer_utils/check_docker_compose_pods.sh
                ./tests_end_to_end/installer_utils/check_docker_compose_pods.sh
              shell: bash

            - name: Check backend health (Local)
              run: |
                chmod +x ./tests_end_to_end/installer_utils/check_backend.sh
                ./tests_end_to_end/installer_utils/check_backend.sh
              shell: bash

            - name: Verify app is up via UI (smoke test)
              if: matrix.shard == 1
              working-directory: ${{ github.workspace }}/tests_end_to_end/typescript-tests
              env:
                OPIK_BASE_URL: http://localhost:5173
                OPIK_TEST_WORKSPACE: default
                OPIK_TEST_PROJECT_NAME: automated_tests_project
              run: |
                npx playwright test --grep "Projects created via SDK are visible" --reporter=list

            - name: Run TypeScript E2E suite (shard ${{ matrix.shard }}/4)
              working-directory: ${{ github.workspace }}/tests_end_to_end/typescript-tests
              env:
                OPIK_BASE_URL: http://localhost:5173
                OPIK_TEST_WORKSPACE: default
                OPIK_TEST_PROJECT_NAME: automated_tests_project
                OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
                ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
                TEST_SUITE: ${{ github.event.inputs.suite || 'fullregression' }}
                ALLURE_LAUNCH_ID: ${{ needs.setup-allure.outputs.launch_id }}
                PLAYWRIGHT_BLOB_OUTPUT_FILE: blob-report/report-${{ matrix.shard }}.zip
              run: |
                export ALLURE_RESULTS="${{ github.workspace }}/tests_end_to_end/typescript-tests/${ALLURE_RESULTS}"
                allurectl watch -- npx playwright test \
                  --shard=${{ matrix.shard }}/${{ env.SHARD_TOTAL }} \
                  --reporter=blob,allure-playwright,list

            - name: Upload blob report (shard ${{ matrix.shard }})
              if: always()
              uses: actions/upload-artifact@v7
              with:
                name: blob-report-${{ matrix.shard }}
                path: tests_end_to_end/typescript-tests/blob-report
                retention-days: 1

            - name: Upload test-results (shard ${{ matrix.shard }})
              if: failure()
              uses: actions/upload-artifact@v7
              with:
                name: test-results-${{ matrix.shard }}
                path: tests_end_to_end/typescript-tests/test-results
                retention-days: 7
                if-no-files-found: ignore

            - name: Stop Opik server (Local)
              if: always()
              run: |
                cd ${{ github.workspace }}
                ./opik.sh --stop

        continue-on-error: ${{ github.event_name == 'pull_request' }}

    merge-reports:
        name: Merge Playwright reports
        if: always()
        needs: [run_suite]
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - name: Checkout repo
              uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                node-version: '20'
                cache: 'npm'
                cache-dependency-path: tests_end_to_end/typescript-tests/package-lock.json

            - name: Install TypeScript Test Dependencies
              working-directory: tests_end_to_end/typescript-tests
              run: npm ci

            - name: Download blob reports
              uses: actions/download-artifact@v6
              with:
                path: tests_end_to_end/typescript-tests/all-blob-reports
                pattern: blob-report-*
                merge-multiple: true

            - name: Merge into HTML report
              working-directory: tests_end_to_end/typescript-tests
              run: |
                npx playwright merge-reports --reporter=html ./all-blob-reports

            - name: Upload merged HTML report
              uses: actions/upload-artifact@v7
              with:
                name: playwright-report
                path: tests_end_to_end/typescript-tests/playwright-report
                retention-days: 7

    close-allure-launch:
        name: "Close Allure launch"
        if: always() && needs.setup-allure.outputs.launch_id != ''
        needs: [setup-allure, run_suite]
        runs-on: ubuntu-latest
        timeout-minutes: 5
        steps:
            - name: Install allurectl
              uses: allure-framework/setup-allurectl@v1

            - name: Close launch
              env:
                LAUNCH_ID: ${{ needs.setup-allure.outputs.launch_id }}
              run: |
                allurectl launch close "${LAUNCH_ID}"
