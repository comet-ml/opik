name: Frontend Linter
run-name: "Frontend Linter ${{ github.ref_name }} by @${{ github.actor }}"
on:
  pull_request:
    paths: 
      - "apps/opik-frontend/src/**"
      - "apps/opik-frontend/tests/**"
      - "apps/opik-frontend/package.json"
      - "apps/opik-frontend/package-lock.json"
      - "apps/opik-frontend/tsconfig.json"
      - "apps/opik-frontend/.eslintrc"
      - "apps/opik-frontend/vite.config.ts"
  push:
    branches: 
      - 'main'
    paths: 
      - "apps/opik-frontend/src/**"
      - "apps/opik-frontend/tests/**"
      - "apps/opik-frontend/package.json"
      - "apps/opik-frontend/package-lock.json"
      - "apps/opik-frontend/tsconfig.json"
      - "apps/opik-frontend/.eslintrc"
      - "apps/opik-frontend/vite.config.ts"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: apps/opik-frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Dependency validation
        run: npm run deps:validate
